<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Encuesta de Satisfacción</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #4338ca;
            --bg: #ffffff;
            --bg-secondary: #f8fafc;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #22c55e;
            --face-1: #ef4444;
            --face-2: #f97316;
            --face-3: #eab308;
            --face-4: #84cc16;
            --face-5: #22c55e;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 2.5rem 2rem;
            text-align: center;
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: var(--shadow-lg);
            margin: 1rem;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--face-1), var(--face-2), var(--face-3), var(--face-4), var(--face-5));
        }

        .header-badge {
            display: inline-block;
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }

        .title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .faces-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .face-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .face-btn {
            background: var(--bg-secondary);
            border: 2px solid var(--card-border);
            border-radius: 1rem;
            padding: 0.875rem;
            cursor: pointer;
            font-size: 2.5rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            flex-shrink: 0;
            width: 64px;
            height: 64px;
        }

        .face-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-lg);
        }

        .face-btn:active {
            transform: scale(0.95);
        }

        .face-btn.selected {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
            animation: pulse 0.3s ease;
        }

        .face-btn[data-value="1"] { border-color: var(--face-1); }
        .face-btn[data-value="2"] { border-color: var(--face-2); }
        .face-btn[data-value="3"] { border-color: var(--face-3); }
        .face-btn[data-value="4"] { border-color: var(--face-4); }
        .face-btn[data-value="5"] { border-color: var(--face-5); }

        .face-btn[data-value="1"].selected { background: rgba(239, 68, 68, 0.15); }
        .face-btn[data-value="2"].selected { background: rgba(249, 115, 22, 0.15); }
        .face-btn[data-value="3"].selected { background: rgba(234, 179, 8, 0.15); }
        .face-btn[data-value="4"].selected { background: rgba(132, 204, 22, 0.15); }
        .face-btn[data-value="5"].selected { background: rgba(34, 197, 94, 0.15); }

        .face-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Pantalla de agradecimiento */
        .thank-you {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .thank-you.visible {
            display: block;
        }

        .thank-you .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .thank-you .message {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 0.5rem;
        }

        .thank-you .submessage {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .survey-screen.hidden {
            display: none;
        }

        /* Área de comentario opcional */
        .comment-section {
            margin-top: 1.5rem;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .comment-section.visible {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .comment-section textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 2px solid var(--card-border);
            background: var(--bg-secondary);
            color: var(--text);
            font-size: 0.95rem;
            resize: none;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        .comment-section textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .comment-section textarea::placeholder {
            color: var(--text-muted);
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
            flex: 1;
        }

        .submit-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .skip-btn {
            background: transparent;
            color: var(--text-muted);
            border: 2px solid var(--card-border);
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
        }

        .skip-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--text-muted);
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--face-1);
            color: var(--face-1);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }

        .error-message.visible {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Realm indicator */
        .realm-indicator {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }

        /* Privacy link */
        .privacy-link {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .privacy-link a {
            color: var(--primary);
            text-decoration: none;
        }

        .privacy-link a:hover {
            text-decoration: underline;
        }

        /* Comment section styles */
        .comment-prompt {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .comment-rating {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .comment-rating-btn {
            width: 48px;
            height: 48px;
            border: 2px solid var(--card-border);
            border-radius: 50%;
            background: var(--bg-secondary);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .comment-rating-btn:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.1);
        }

        .comment-rating-btn.selected {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .comment-yesno {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .comment-yesno-btn {
            padding: 0.75rem 2rem;
            border: 2px solid var(--card-border);
            border-radius: 0.75rem;
            background: var(--bg-secondary);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .comment-yesno-btn:hover {
            border-color: var(--primary);
        }

        .comment-yesno-btn.selected {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .comment-options-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .comment-option-btn {
            padding: 0.75rem 1rem;
            border: 2px solid var(--card-border);
            border-radius: 0.75rem;
            background: var(--bg-secondary);
            font-size: 0.95rem;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .comment-option-btn:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }

        .comment-option-btn.selected {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                margin: 0.5rem;
                padding: 2rem 1.25rem;
                border-radius: 1rem;
            }

            .title {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .faces-container {
                gap: 0.5rem;
            }

            .face-btn {
                width: 56px;
                height: 56px;
                font-size: 2rem;
                padding: 0.75rem;
            }

            .face-label {
                font-size: 0.75rem;
            }

            .button-group {
                flex-direction: column;
            }

            .submit-btn, .skip-btn {
                width: 100%;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding: 1rem;
                margin: 0.5rem;
            }

            .title {
                font-size: 1.25rem;
                margin-bottom: 0.25rem;
            }

            .subtitle {
                margin-bottom: 0.75rem;
            }

            .faces-container {
                margin-bottom: 0.75rem;
                gap: 0.5rem;
            }

            .face-btn {
                width: 48px;
                height: 48px;
                font-size: 1.75rem;
                padding: 0.5rem;
            }

            .comment-section textarea {
                padding: 0.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Pantalla de encuesta -->
        <div class="survey-screen" id="surveyScreen">
            <div class="realm-indicator" id="realmIndicator"></div>

            <div class="header-badge" id="headerBadge">Encuesta de Satisfacción</div>
            <h1 class="title" id="surveyTitle">¿Cómo fue tu atención?</h1>
            <p class="subtitle" id="surveySubtitle">Tu opinión nos ayuda a mejorar</p>

            <div class="error-message" id="errorMessage"></div>

            <div class="faces-container">
                <div class="face-wrapper">
                    <button class="face-btn" data-value="1" aria-label="Muy insatisfecho">😢</button>
                    <span class="face-label">Muy mal</span>
                </div>
                <div class="face-wrapper">
                    <button class="face-btn" data-value="2" aria-label="Insatisfecho">😕</button>
                    <span class="face-label">Mal</span>
                </div>
                <div class="face-wrapper">
                    <button class="face-btn" data-value="3" aria-label="Neutral">😐</button>
                    <span class="face-label">Regular</span>
                </div>
                <div class="face-wrapper">
                    <button class="face-btn" data-value="4" aria-label="Satisfecho">🙂</button>
                    <span class="face-label">Bien</span>
                </div>
                <div class="face-wrapper">
                    <button class="face-btn" data-value="5" aria-label="Muy satisfecho">😊</button>
                    <span class="face-label">Muy bien</span>
                </div>
            </div>

            <div class="comment-section" id="commentSection">
                <!-- Paso 2: Comentarios (solo si hay encuestas enlazadas) -->
                <div id="commentStep" style="display: none;">
                    <p class="comment-prompt" id="commentPrompt">¿Quieres añadir un comentario?</p>
                    <div id="commentOptions" class="comment-options"></div>
                    <div class="button-group">
                        <button class="submit-btn" id="submitBtn">Enviar</button>
                        <button class="skip-btn" id="skipBtn">Omitir</button>
                    </div>
                </div>

                <!-- Paso 1: Solo rating (sin chain) -->
                <div id="ratingOnlySection" style="display: none;">
                    <div class="button-group">
                        <button class="submit-btn" id="submitBtnSimple">Enviar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pantalla de agradecimiento -->
        <div class="thank-you" id="thankYouScreen">
            <div class="icon">✓</div>
            <div class="message">¡Gracias!</div>
            <div class="submessage">Tu opinión ha sido registrada</div>
        </div>

        <div class="privacy-link" id="privacyLink">
            <a href="#" id="privacyBtn">Política de privacidad</a>
        </div>
    </div>

    <!-- Cargar script externo -->
    <script src="satisfaccion.js"></script>
</body>

</html>
